<script>
(function() {
    'use strict';

    // ==========================================
    // 1. ЗАВИСИМОСТИ И КОНФИГУРАЦИЯ
    // ==========================================
    const waitForGlobals = () => new Promise((resolve, reject) => {
        let attempts = 0;
        const check = () => {
            if (window.AppState && window.supabase && window.Utils) resolve();
            else if (++attempts > 100) reject(new Error('Timeout waiting for globals'));
            else setTimeout(check, 100);
        };
        check();
    });

    waitForGlobals().then(initModule).catch(err => {
        console.error('Modal2 Init Failed:', err);
        const el = document.getElementById('files-list');
        if (el) el.innerHTML = '<div class="text-center py-10 text-red-400 text-xs">Ошибка загрузки модуля. Обновите страницу.</div>';
    });

    async function initModule() {
        const state = window.AppState;
        const supabase = window.supabase;
        const utils = window.Utils;

        const CONFIG = {
            MSG_PAGE: 50, MSG_LOAD: 30, SCROLL_THR: 50,
            RECONNECT_BASE: 1000, RECONNECT_MAX: 8000, MAX_RECONNECT: 6,
            AUTHOR_TTL: 3600000 // 1 час
        };

        // ==========================================
        // 2. СОСТОЯНИЕ И КЭШ
        // ==========================================
        const localState = {
            projects: [], files: [], messages: [],
            activeProjectId: null, activeProjectName: null, activeProjectOwnerId: null,
            isSuperAdmin: state.appUser?.is_super_admin || false,
            realtimeChannel: null, isLoadingMessages: false, hasMoreMessages: true, oldestMessageDate: null,
            knownAuthors: new Map(), connectionStatus: 'connected', reconnectAttempts: 0,
            fileRefreshInterval: null, confirmCallback: null, tempMsgs: new Set()
        };

        if (state.currentUser && state.appUser) {
            localState.knownAuthors.set(state.currentUser.id, { name: state.appUser.name || state.currentUser.email, ts: Date.now() });
        }

        // ==========================================
        // 3. УТИЛИТЫ
        // ==========================================
        const escapeHtml = text => {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        };

        const extractStoragePath = url => {
            if (!url) return '';
            try {
                const match = new URL(url).pathname.match(/\/storage\/v1\/object\/public\/user-files\/(.+)$/);
                return match ? decodeURIComponent(match[1]) : '';
            } catch { return ''; }
        };

        const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

        const getAuthorName = id => {
            const cached = localState.knownAuthors.get(id);
            if (cached && Date.now() - cached.ts < CONFIG.AUTHOR_TTL) return cached.name;
            return null;
        };

        const cacheAuthor = (id, name) => localState.knownAuthors.set(id, { name, ts: Date.now() });

        const fetchAuthorLazy = async id => {
            if (!id || localState.knownAuthors.has(id)) return;
            try {
                const { data } = await supabase.from('app_users').select('name').eq('id', id).single();
                if (data) cacheAuthor(id, data.name || 'Пользователь');
            } catch {}
        };

        const updateConnectionUI = () => {
            const badge = document.getElementById('connection-status');
            if (!badge) return;
            const dot = badge.querySelector('.status-dot');
            const text = badge.querySelector('.status-text');
            
            const map = {
                connected: { color: 'bg-green-500', txt: 'Подключено', border: 'border-green-500/30' },
                reconnecting: { color: 'bg-yellow-500', txt: 'Восстановление...', border: 'border-yellow-500/30' },
                disconnected: { color: 'bg-red-500', txt: 'Отключено', border: 'border-red-500/30' },
                failed: { color: 'bg-red-600', txt: 'Ошибка соединения', border: 'border-red-600/30' }
            };
            const cfg = map[localState.connectionStatus] || map.disconnected;
            dot.className = `w-1.5 h-1.5 rounded-full status-dot ${cfg.color}`;
            text.textContent = cfg.txt;
            badge.className = `flex items-center gap-1.5 px-2 py-1 rounded-full text-[10px] font-medium bg-surface border transition-all ${cfg.border}`;
        };

        // ==========================================
        // 4. ЭЛЕМЕНТЫ UI
        // ==========================================
        const ui = {
            projectsList: document.getElementById('projects-list'),
            filesList: document.getElementById('files-list'),
            chatMessages: document.getElementById('chat-messages'),
            chatInput: document.getElementById('chat-input'),
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            chatProjectName: document.getElementById('chat-project-name'),
            uploadHint: document.getElementById('upload-hint'),
            sendBtn: document.getElementById('send-msg-btn'),
            uploadModal: document.getElementById('upload-modal'),
            uploadList: document.getElementById('upload-list'),
            uploadCount: document.getElementById('upload-count'),
            confirmModal: document.getElementById('confirm-modal'),
            confirmModalMsg: document.getElementById('confirm-modal-message'),
            confirmModalOk: document.getElementById('confirm-modal-ok'),
            confirmModalCancel: document.getElementById('confirm-modal-cancel'),
            createModal: document.getElementById('create-project-modal'),
            createModalInput: document.getElementById('new-project-name-input'),
            deleteProjectSection: document.getElementById('delete-project-section'),
            membersModal: document.getElementById('members-modal'),
            membersList: document.getElementById('members-list'),
            addMemberInput: document.getElementById('add-member-input'),
            userSuggestions: document.getElementById('user-suggestions')
        };

        // ==========================================
        // 5. API ЗАПРОСЫ
        // ==========================================
        const api = {
            loadProjects: async () => {
                let data = null, error = null;
                try {
                    const res = await supabase.rpc('get_accessible_projects');
                    if (res.error) throw res.error;
                    data = res.data;
                } catch (e) {
                    console.warn("RPC fallback:", e.message);
                    const res = await supabase.from('projects').select('*').eq('owner_id', state.currentUser.id).order('created_at', { ascending: false });
                    data = res.data; error = res.error;
                }
                if (error) throw error;
                localState.projects = data || [];
                renderProjects();
            },
            loadFiles: async (projectId) => {
                if (!projectId || localState.isLoadingFiles) return;
                localState.isLoadingFiles = true;
                try {
                    const [filesRes, projRes] = await Promise.all([
                        supabase.from('files').select('id, name, created_at, size, storage_path, tags, project_id, uploader_id').eq('project_id', projectId).order('created_at', { ascending: false }),
                        supabase.from('projects').select('owner_id').eq('id', projectId).single()
                    ]);
                    if (filesRes.error) throw filesRes.error;
                    localState.files = filesRes.data || [];
                    if (!projRes.error) localState.activeProjectOwnerId = projRes.data?.owner_id;
                    renderFiles();
                } catch (e) { console.error("Load files error:", e); }
                finally { localState.isLoadingFiles = false; }
            },
            loadMessages: async (initial = true) => {
                if (localState.isLoadingMessages || !localState.activeProjectId) return;
                if (!initial && !localState.hasMoreMessages) return;
                localState.isLoadingMessages = true;

                let query = supabase.from('messages').select('id, content, created_at, sender_id, project_id').eq('project_id', localState.activeProjectId).order('created_at', { ascending: false });
                if (!initial && localState.oldestMessageDate) query = query.lt('created_at', localState.oldestMessageDate);
                query = query.limit(initial ? CONFIG.MSG_PAGE : CONFIG.MSG_LOAD);

                try {
                    const { data, error } = await query;
                    if (error) throw error;
                    if (!data.length) {
                        localState.hasMoreMessages = false;
                        if (initial) ui.chatMessages.innerHTML = `<div class="text-center py-10 text-ink-muted text-xs">Нет сообщений</div>`;
                        return;
                    }
                    data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                    data.forEach(m => { if (m.sender_id) fetchAuthorLazy(m.sender_id); });
                    
                    if (initial) {
                        localState.messages = data;
                        renderMessages();
                        scrollToBottom();
                    } else {
                        const prevH = ui.chatMessages.scrollHeight;
                        localState.messages = [...data, ...localState.messages];
                        renderMessages();
                        ui.chatMessages.scrollTop = ui.chatMessages.scrollHeight - prevH;
                    }
                    localState.oldestMessageDate = localState.messages[0]?.created_at;
                } catch (e) { console.error("Load msg error:", e); }
                finally { localState.isLoadingMessages = false; }
            }
        };

        // ==========================================
        // 6. REALTIME & СОЕДИНЕНИЕ
        // ==========================================
        const setupRealtime = (projectId) => {
    // 1. Сначала отписываемся от старого канала, если есть
    if (localState.realtimeChannel) {
        localState.realtimeChannel.unsubscribe();
        localState.realtimeChannel = null;
    }
    
    if (!projectId) return;

    localState.connectionStatus = 'reconnecting';
    updateConnectionUI();

    // 2. Создаём новый канал
    const channel = supabase.channel(`chat:${projectId}`, { 
        config: { broadcast: { self: true } } 
    });

    // 3. ⚠️ ВАЖНО: Регистрируем ВСЕ обработчики ДО subscribe()
    channel.on('postgres_changes', { 
        event: 'INSERT', 
        schema: 'public', 
        table: 'messages', 
        filter: `project_id=eq.${projectId}` 
    }, handleNewMessage);

    // 4. Только после всех .on() вызываем subscribe()
    channel.subscribe((status) => {
        if (status === 'SUBSCRIBED') {
            localState.realtimeChannel = channel;
            localState.connectionStatus = 'connected';
            localState.reconnectAttempts = 0;
            updateConnectionUI();
            api.loadMessages(true);  // ✅ через api.
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
            localState.connectionStatus = 'disconnected';
            updateConnectionUI();
            scheduleReconnect(projectId);
        }
    });
};

        const scheduleReconnect = (projectId) => {
            if (localState.reconnectAttempts >= CONFIG.MAX_RECONNECT) {
                localState.connectionStatus = 'failed';
                updateConnectionUI();
                utils.showToast('Потеряно соединение с чатом', 'error');
                return;
            }
            const delay = Math.min(CONFIG.RECONNECT_BASE * Math.pow(2, localState.reconnectAttempts), CONFIG.RECONNECT_MAX);
            setTimeout(() => {
                if (localState.activeProjectId === projectId && localState.connectionStatus !== 'connected') {
                    localState.reconnectAttempts++;
                    setupRealtime(projectId);
                }
            }, delay);
        };

        const handleNewMessage = async (payload) => {
    const msg = payload.new;
    
    // ✅ Проверка 1: сообщение уже есть в локальном массиве по реальному ID
    const existingIdx = localState.messages.findIndex(m => m.id === msg.id);
    if (existingIdx !== -1) {
        // Обновляем существующее сообщение (например, меняем статус pending → sent)
        localState.messages[existingIdx] = { ...localState.messages[existingIdx], ...msg, status: 'sent' };
        renderMessages(); // Перерисовываем чат
        return;
    }
    
    // ✅ Проверка 2: игнорируем сообщения, которые мы только что отправили (по content + sender + time)
    const isDuplicate = localState.messages.some(m => 
        m.sender_id === msg.sender_id && 
        m.content === msg.content && 
        Math.abs(new Date(m.created_at) - new Date(msg.created_at)) < 2000 // 2 секунды окно
    );
    if (isDuplicate) return;
    
    // ✅ Загружаем имя автора, если нет в кэше

        const sendMessage = async () => {
    const text = ui.chatInput.value.trim();
    if (!text || !localState.activeProjectId) return;
    
    if (localState.connectionStatus !== 'connected') {
        utils.showToast("Нет соединения. Попробуйте позже.", "warning");
        return;
    }

    ui.chatInput.value = ''; 
    ui.chatInput.style.height = 'auto';
    
    // Создаём временное сообщение с уникальным ID
    const tempId = 'temp-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
    localState.tempMsgs.add(tempId);
    
    const tempMsg = {
        id: tempId,
        content: text,
        created_at: new Date().toISOString(),
        sender_id: state.currentUser.id,
        author: { name: state.appUser?.name || 'Вы' },
        status: 'pending',
        project_id: localState.activeProjectId
    };
    
    // Добавляем в массив и отображаем
    localState.messages.push(tempMsg);
    appendMessage(tempMsg);
    scrollToBottom();

    try {
        // Отправляем в БД
        const { data, error } = await supabase
            .from('messages')
            .insert({ 
                project_id: localState.activeProjectId, 
                sender_id: state.currentUser.id, 
                content: text 
            })
            .select()
            .single();
            
        localState.tempMsgs.delete(tempId);
        
        if (error) throw error;
        
        // ✅ НАХОДИМ и ОБНОВЛЯЕМ временное сообщение вместо удаления
        const tempIdx = localState.messages.findIndex(m => m.id === tempId);
        if (tempIdx !== -1) {
            // Заменяем временное сообщение на реальное с сервера
            localState.messages[tempIdx] = { 
                ...data, 
                author: { name: getAuthorName(data.sender_id) || state.appUser?.name || 'Вы' },
                status: 'sent' 
            };
            // Перерисовываем только это сообщение (оптимизация) или весь чат
            renderMessages();
        }
        
    } catch (e) {
        console.error('Send error:', e);
        utils.showToast('Ошибка отправки', 'error');
        // Удаляем только при реальной ошибке
        localState.messages = localState.messages.filter(m => m.id !== tempId);
        localState.tempMsgs.delete(tempId);
        renderMessages();
    }
};

        const handleFiles = async (filesList) => {

            const valid = Array.from(filesList).filter(f => f.size <= 49 * 1024 * 1024);
            if (valid.length === 0) return utils.showToast('Файлы > 49МБ нельзя загрузить', 'error');

            ui.uploadList.innerHTML = valid.map(f => `
                <div class="upload-file-item" data-name="${escapeHtml(f.name)}">

                </div>`).join('');

            ui.uploadModal.classList.remove('hidden');

            for (const file of valid) {
                const item = ui.uploadList.querySelector(`[data-name="${file.name}"]`);
                const fill = item.querySelector('.upload-progress-fill');
                const txt = item.querySelector('.progress-text');
                txt.textContent = "Загрузка...";
                
                const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_').toLowerCase();

                try {
                    const { error } = await supabase.storage.from('user-files').upload(path, file, {
                        onUploadProgress: (p) => { fill.style.width = `${Math.round((p.loaded/p.total)*100)}%`; }
                    });
                    if (error) throw error;
                    
                    const { data: urlData } = supabase.storage.from('user-files').getPublicUrl(path);
                    await supabase.from('files').insert({ project_id: localState.activeProjectId, uploader_id: state.currentUser.id, name: file.name, original_name: file.name, mime_type: file.type, size: file.size, storage_path: urlData.publicUrl, tags: [] });

            });

            ui.dropZone.addEventListener('click', () => ui.fileInput.click());
            ui.fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
            ui.dropZone.addEventListener('dragover', (e) => { e.preventDefault(); ui.dropZone.classList.add('border-ink', 'bg-surface'); });
            ui.dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); ui.dropZone.classList.remove('border-ink', 'bg-surface'); });
            ui.dropZone.addEventListener('drop', (e) => { e.preventDefault(); ui.dropZone.classList.remove('border-ink', 'bg-surface'); handleFiles(e.dataTransfer.files); });

            ui.chatInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
            ui.chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
            document.getElementById('send-msg-btn').addEventListener('click', sendMessage);

            const debouncedScroll = debounce(async () => {
                if (ui.chatMessages.scrollTop < CONFIG.SCROLL_THR && !localState.isLoadingMessages && localState.hasMoreMessages && localState.activeProjectId) {
                    await api.loadMessages(false);
                }
            }, 150);
            ui.chatMessages.addEventListener('scroll', debouncedScroll);

            ui.addMemberInput.addEventListener('input', async (e) => {
                const q = e.target.value; if (q.length < 2) { ui.userSuggestions.classList.add('hidden'); return; }
                try {
                    const { data, error } = await supabase.rpc('search_users', { search_query: q });
                    if (error || !data?.length) { ui.userSuggestions.classList.add('hidden'); return; }
                    ui.userSuggestions.innerHTML = data.map(u => `<div class="suggestion-item p-2 hover:bg-surface cursor-pointer" data-id="${u.id}" data-name="${escapeHtml(u.name||u.email)}"><p class="text-xs text-ink">${escapeHtml(u.name||'User')}</p><p class="text-[10px] text-ink-muted">${escapeHtml(u.email)}</p></div>`).join('');
                    ui.userSuggestions.classList.remove('hidden');
                    ui.userSuggestions.querySelectorAll('.suggestion-item').forEach(item => item.addEventListener('click', () => { addMember(item.dataset.id, item.dataset.name); ui.userSuggestions.classList.add('hidden'); }));
                } catch {}
            });
            document.addEventListener('click', (e) => { if (!ui.addMemberInput.contains(e.target) && !ui.userSuggestions.contains(e.target)) ui.userSuggestions.classList.add('hidden'); });
        };

        // ==========================================
        // 10. ЗАПУСК
        // ==========================================
        await api.loadProjects();
        updateConnectionUI();
        initEvents();
    }
})();
</script>
