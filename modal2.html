<div class="w-full h-[calc(100vh-64px)] overflow-hidden flex justify-center bg-surface-bright/20">
    
    <!-- Контейнер 1600px -->
    <div class="w-[1600px] h-full flex border-l border-r border-gray-light bg-surface-bright">
        
        <!-- ЛЕВАЯ ПАНЕЛЬ: Проекты -->
        <aside class="w-[300px] flex-shrink-0 border-r border-gray-light flex flex-col">
            <div class="p-4 border-b border-gray-light flex items-center justify-between">
                <h2 class="font-display font-semibold text-ink">Проекты</h2>
                <button id="create-project-btn" class="w-8 h-8 rounded-lg border border-gray-light hover:border-ink/30 hover:bg-surface flex items-center justify-center transition-colors" title="Новый проект">
                    <svg class="w-4 h-4 text-ink-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                    </svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="projects-list">
                <div class="text-center py-10 text-ink-muted text-xs">Загрузка...</div>
            </div>
        </aside>

        <!-- ЦЕНТРАЛЬНАЯ ПАНЕЛЬ: Файлы -->
        <main class="flex-1 min-w-0 flex flex-col">
            <div class="p-4 border-b border-gray-light">
                <div id="drop-zone" class="border-2 border-dashed border-gray-light rounded-xl p-4 text-center cursor-pointer hover:border-ink/20 transition-colors">
                    <input type="file" id="file-input" multiple class="hidden">
                    <svg class="w-6 h-6 text-ink-muted mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <p class="text-xs text-ink-light">Перетащите файлы или кликните для выбора</p>

            <div class="flex-1 overflow-y-auto p-4 space-y-5" id="files-list"></div>
        </main>

        <!-- ПРАВАЯ ПАНЕЛЬ: Чат -->
        <aside class="w-[600px] flex-shrink-0 border-l border-gray-light flex flex-col bg-surface-bright/30">

                    <textarea id="chat-input" placeholder="Выберите проект..." class="w-full bg-surface border border-gray-light rounded-lg px-4 py-2 text-sm text-ink focus:outline-none focus:border-ink/30 disabled:opacity-50 font-sans tracking-normal resize-none overflow-hidden" rows="1" disabled></textarea>
                    <div class="flex justify-end">
                        <button id="send-msg-btn" class="btn-primary px-4 py-2 rounded-lg text-surface-bright disabled:opacity-50" disabled>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>

            </button>
        </div>

</template>

<script>
(function() {
    function waitForGlobals(callback) {
        if (window.AppState && window.supabase && window.Utils) callback();
        else setTimeout(() => waitForGlobals(callback), 100);
    }

    waitForGlobals(() => {
        const state = window.AppState;
        const supabase = window.supabase;
        const utils = window.Utils;
        
        const localState = {
            projects: [],
            files: [],
            messages: [],
            activeProject: null, 
            activeProjectOwner: null,
            activeProjectName: null,
            isSuperAdmin: state.appUser?.is_super_admin || false,
            realtimeChannel: null,
            isLoadingMessages: false,
            hasMoreMessages: true,
            oldestMessageDate: null,
            allTags: new Set(),
            confirmCallback: null // Для модального окна подтверждения
        };

        const elements = {
            projectsList: document.getElementById('projects-list'),
            filesList: document.getElementById('files-list'),
            chatMessages: document.getElementById('chat-messages'),
            chatInput: document.getElementById('chat-input'),
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            chatProjectName: document.getElementById('chat-project-name'),
            uploadHint: document.getElementById('upload-hint'),
            sendBtn: document.getElementById('send-msg-btn'),
            membersModal: document.getElementById('members-modal'),
            membersList: document.getElementById('members-list'),
            addMemberInput: document.getElementById('add-member-input'),
            userSuggestions: document.getElementById('user-suggestions'),
            createModal: document.getElementById('create-project-modal'),
            createModalInput: document.getElementById('new-project-name-input'),
            deleteProjectSection: document.getElementById('delete-project-section'),
            confirmModal: document.getElementById('confirm-modal'),
            confirmModalMsg: document.getElementById('confirm-modal-message'),
            confirmModalOk: document.getElementById('confirm-modal-ok'),
            confirmModalCancel: document.getElementById('confirm-modal-cancel')
        };

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        async function init() {
            await loadProjects();
            await loadAllTags();
            await loadFiles();
            updateChatState(false);
            initEventListeners();
        }

        // ============================================
        // ЗАГРУЗКА ДАННЫХ
        // ============================================
        
        async function loadProjects() {
            let data = null;
            let error = null;

            const rpcResult = await supabase.rpc('get_accessible_projects');
            
            if (rpcResult.error) {
                console.warn("RPC failed, fallback", rpcResult.error);
                const fallbackResult = await supabase.from('projects').select('*').eq('owner_id', state.currentUser.id).order('created_at', { ascending: false });
                data = fallbackResult.data;
                error = fallbackResult.error;
                if (!error) localState.isSuperAdmin = false;
            } else {
                data = rpcResult.data;
                error = rpcResult.error;
            }

            if (error) {
                elements.projectsList.innerHTML = `<div class="text-center py-10 text-red-400 text-xs">Ошибка загрузки</div>`;
                return;
            }

            localState.projects = data || [];
            renderProjects();
        }

        async function loadAllTags() {
            const { data: files } = await supabase.from('files').select('tags');
            if(files) files.forEach(f => { if(f.tags) f.tags.forEach(t => localState.allTags.add(t)); });
        }

        async function loadFiles() {
            if (!localState.activeProject) return;
            
            const [filesRes, projectRes] = await Promise.all([
                supabase.from('files').select('id, name, created_at, size, storage_path, tags, project_id, profiles:uploader_id(name, email), uploader_id').eq('project_id', localState.activeProject).order('created_at', { ascending: false }),
                supabase.from('projects').select('owner_id').eq('id', localState.activeProject).single()
            ]);

            if (filesRes.error) { console.error(filesRes.error); return; }
            
            localState.files = filesRes.data || [];
            if (!projectRes.error) localState.activeProjectOwner = projectRes.data?.owner_id;
            
            renderFiles();
        }

        // ============================================
        // ЧАТ ЛОГИКА
        // ============================================
        function updateChatState(isActive) {
            elements.chatInput.disabled = !isActive;
            elements.sendBtn.disabled = !isActive;
            if (!isActive) {
                elements.chatMessages.innerHTML = `<div class="text-center py-10 text-ink-muted text-xs flex items-center justify-center h-full">Выберите проект</div>`;
                elements.chatProjectName.textContent = "Выберите проект";
            } else {
                elements.chatProjectName.textContent = localState.activeProjectName;
                elements.chatInput.placeholder = "Написать сообщение...";
            }
        }

        async function loadMessages(initial = true) {
            if (localState.isLoadingMessages) return;
            if (!initial && !localState.hasMoreMessages) return;
            localState.isLoadingMessages = true;
            let query = supabase.from('messages').select('id, content, created_at, sender_id, author:sender_id(name, email)').eq('project_id', localState.activeProject).order('created_at', { ascending: false });
            if (!initial && localState.oldestMessageDate) query = query.lt('created_at', localState.oldestMessageDate);
            query = query.limit(initial ? 50 : 30);
            const { data, error } = await query;
            if (error) { localState.isLoadingMessages = false; return; }
            if (data.length === 0) { localState.hasMoreMessages = false; localState.isLoadingMessages = false; if(initial) elements.chatMessages.innerHTML = `<div class="text-center py-10 text-ink-muted text-xs">Нет сообщений</div>`; return; }
            data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            if (initial) { localState.messages = data; renderMessages(); scrollToBottom(); } 
            else {
                const prevScrollHeight = elements.chatMessages.scrollHeight;
                localState.messages = [...data, ...localState.messages];
                renderMessages();
                elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight - prevScrollHeight;
            }
            localState.oldestMessageDate = localState.messages[0]?.created_at;
            localState.hasMoreMessages = true;
            localState.isLoadingMessages = false;
        }

        async function subscribeToChat(projectId) {
            if (localState.realtimeChannel) {
                try { await localState.realtimeChannel.unsubscribe(); } catch(e) {}
                localState.realtimeChannel = null;
            }

            await new Promise(resolve => setTimeout(resolve, 50));

            try {
                const channel = supabase.channel(`chat:${projectId}`, { config: { broadcast: { self: true } } });

                channel.on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: `project_id=eq.${projectId}`
                }, (payload) => {
                    const msg = payload.new;
                    if(msg.sender_id === state.currentUser.id) msg.author = { name: state.appUser.name };
                    localState.messages.push(msg);
                    appendMessage(msg);
                    scrollToBottom();
                });

                await channel.subscribe();
                localState.realtimeChannel = channel;
            } catch(e) {
                console.error("Realtime subscription error", e);
            }
        }

        // ============================================
        // РЕНДЕРИНГ
        // ============================================
        function renderProjects() {
            elements.projectsList.innerHTML = `
                <div class="p-2 mb-2 text-xs text-ink-muted uppercase tracking-wider">Проекты ${localState.isSuperAdmin ? '<span class="text-green-500">(Admin)</span>' : ''}</div>
                <div class="space-y-1">
                    ${localState.projects.map(p => `
                        <div class="project-item flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer hover:bg-surface transition-colors ${localState.activeProject === p.id ? 'bg-surface border border-gray-light' : ''}" data-id="${p.id}">
                            <div class="w-2 h-2 rounded-full bg-ink"></div>
                            <span class="text-sm text-ink truncate flex-1">${escapeHtml(p.name)}</span>
                            <div class="flex items-center gap-1 opacity-40 hover:opacity-100 transition-opacity">
                                <button class="project-settings-btn text-ink-muted hover:text-ink p-1" data-id="${p.id}" title="Настройки">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            document.querySelectorAll('.project-item').forEach(el => {
                el.addEventListener('click', async (e) => {
                    if (e.target.closest('.project-settings-btn')) return;
                    selectProject(el.dataset.id);
                });
            });

            document.querySelectorAll('.project-settings-btn').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); openMembersModal(btn.dataset.id); });
            });
        }

        async function selectProject(id) {
            if (localState.activeProject === id) return;

            localState.activeProject = id;
            const project = localState.projects.find(p => p.id === id);
            localState.activeProjectName = project ? project.name : 'Проект';
            localState.activeProjectOwner = project ? project.owner_id : null;
            elements.uploadHint.textContent = `Файлы: "${localState.activeProjectName}"`;
            
            updateChatState(!!id);
            localState.messages = [];
            localState.oldestMessageDate = null;
            localState.hasMoreMessages = true;

            if(id) { 
                await loadMessages(true); 
                await subscribeToChat(id); 
            } else { 
                if(localState.realtimeChannel) {
                    await localState.realtimeChannel.unsubscribe();
                    localState.realtimeChannel = null;
                }
                elements.chatMessages.innerHTML = `<div class="text-center py-10 text-ink-muted text-xs flex items-center justify-center h-full">Выберите проект</div>`; 
            }
            await loadFiles();
            renderProjects();
        }

        function renderFiles() {
            if (localState.files.length === 0) { elements.filesList.innerHTML = `<div class="text-center py-20 text-ink-muted text-sm">Нет файлов</div>`; return; }
            const template = document.getElementById('file-card-template');
            elements.filesList.innerHTML = '';
            
            const canDelete = localState.isSuperAdmin || (localState.activeProjectOwner === state.currentUser.id);

            localState.files.forEach(f => {
                const clone = template.content.cloneNode(true);
                clone.querySelector('.ext-icon').textContent = f.name.split('.').pop().toUpperCase().substring(0,4);
                clone.querySelector('.file-name').textContent = f.name;
                clone.querySelector('.file-meta').textContent = `${f.profiles?.name || 'User'}`;
                clone.querySelector('.file-size').textContent = formatSize(f.size);
                clone.querySelector('a').href = f.storage_path;
                
                // Project Select
                const select = clone.querySelector('.select-project');
                select.innerHTML = '<option value="">Без проекта</option>';
                localState.projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    if (p.id === f.project_id) opt.selected = true;
                    select.appendChild(opt);
                });
                select.value = f.project_id || "";

                // Tags Input
                const inputTags = clone.querySelector('.input-tags');
                inputTags.value = (f.tags || []).join(' ');

                // Delete Button
                const delBtn = clone.querySelector('.delete-file-btn');
                if (canDelete) {
                    delBtn.classList.remove('hidden');
                    delBtn.addEventListener('click', () => handleDeleteFile(f.id, f.storage_path, f.name));
                }

                // Listeners
                select.addEventListener('change', (e) => updateFileProject(f.id, e.target.value));
                inputTags.addEventListener('change', (e) => updateFileTags(f.id, e.target.value));

                elements.filesList.appendChild(clone);
            });
        }
        
        function appendMessage(msg) {
            elements.chatMessages.querySelectorAll('.temp-message').forEach(el => el.remove());
            elements.chatMessages.insertAdjacentHTML('beforeend', createMessageHTML(msg));
        }
        function renderMessages() { elements.chatMessages.innerHTML = localState.messages.map(m => createMessageHTML(m)).join(''); }
        function createMessageHTML(m) {
            return `<div class="message-item p-2 rounded-lg hover:bg-surface/50"><div class="flex items-start gap-2"><div class="w-6 h-6 rounded-full bg-surface border border-gray-light flex-shrink-0 flex items-center justify-center text-[8px] text-ink-muted">${m.author?.name ? escapeHtml(m.author.name.charAt(0).toUpperCase()) : 'U'}</div><div class="flex-1"><div class="flex items-baseline gap-2"><span class="text-[11px] font-semibold text-ink">${escapeHtml(m.author?.name || 'System')}</span><span class="text-[9px] text-ink-muted">${formatTime(m.created_at)}</span></div><p class="text-xs text-ink-light mt-0.5 whitespace-pre-wrap break-words">${escapeHtml(m.content)}</p></div></div></div>`;
        }

        // ============================================
        // ДЕЙСТВИЯ
        // ============================================

        // Универсальная функция показа подтверждения
        function showConfirmModal(message, callback) {
            elements.confirmModalMsg.textContent = message;
            elements.confirmModal.classList.remove('hidden');
            localState.confirmCallback = callback;
        }

        async function updateFileProject(fileId, projectId) {
            const { error } = await supabase.from('files').update({ project_id: projectId || null }).eq('id', fileId);
            if (error) utils.showToast("Ошибка обновления проекта", "error");
        }

        async function updateFileTags(fileId, tagsString) {
            const tags = tagsString.split(' ').filter(t => t.trim() !== '');
            const { error } = await supabase.from('files').update({ tags }).eq('id', fileId);
            if(error) utils.showToast("Ошибка сохранения тегов", "error");
        }

        async function handleDeleteProject(projectId) {
            showConfirmModal('Удалить проект и все файлы?', async () => {
                utils.showToast('Удаление проекта...', 'info');

                const { data: files } = await supabase.from('files').select('storage_path').eq('project_id', projectId);
                
                if (files && files.length > 0) {
                    const storagePaths = files.map(p => {
                        try {
                            const url = new URL(p.storage_path);
                            return decodeURIComponent(url.pathname.split('/user-files/')[1]);
                        } catch { return null; }
                    }).filter(Boolean);

                    if (storagePaths.length > 0) {
                        await supabase.storage.from('user-files').remove(storagePaths);
                    }
                }

                const { error } = await supabase.from('projects').delete().eq('id', projectId);

                if (error) {
                    utils.showToast('Ошибка удаления: ' + error.message, 'error');
                } else {
                    localState.projects = localState.projects.filter(p => p.id !== projectId);
                    elements.membersModal.classList.add('hidden');
                    if (localState.activeProject === projectId) selectProject(null);
                    renderProjects();
                    utils.showToast('Проект удален', 'success');
                }
            });
        }

        async function handleDeleteFile(fileId, storageUrl, fileName) {
            showConfirmModal(`Удалить файл "${fileName}"?`, async () => {
                try {
                    const url = new URL(storageUrl);
                    const filePath = decodeURIComponent(url.pathname.split('/user-files/')[1]);
                    await supabase.storage.from('user-files').remove([filePath]);
                } catch (e) { console.warn("Storage delete error", e); }

                const { error } = await supabase.from('files').delete().eq('id', fileId);

                if (error) {
                    utils.showToast('Ошибка удаления файла', 'error');
                } else {
                    await logFileAction('delete', fileName);
                    localState.files = localState.files.filter(f => f.id !== fileId);
                    renderFiles();
                    utils.showToast('Файл удален', 'success');
                }
            });
        }

        // ============================================
        // УПРАВЛЕНИЕ УЧАСТНИКАМИ
        // ============================================
        async function openMembersModal(projectId) {
            localState.activeProject = projectId;
            elements.membersModal.classList.remove('hidden');
            elements.membersList.innerHTML = '<div class="text-center text-xs text-ink-muted">Загрузка...</div>';
            
            const project = localState.projects.find(p => p.id === projectId);
            const isOwner = project && project.owner_id === state.currentUser.id;
            if (localState.isSuperAdmin || isOwner) {
                elements.deleteProjectSection.classList.remove('hidden');
            } else {
                elements.deleteProjectSection.classList.add('hidden');
            }

            const { data: members, error } = await supabase.from('project_members').select('id, user_id, app_users(id, email, name, is_super_admin)').eq('project_id', projectId);
            
            if(error) { elements.membersList.innerHTML = '<div class="text-red-500 text-xs">Ошибка</div>'; return; }
            
            let owner = null;
            if (project.owner_id === state.currentUser.id) owner = state.appUser;
            else {
                try {
                     const { data: ownerData } = await supabase.from('app_users').select('*').eq('id', project.owner_id).single();
                     owner = ownerData;
                } catch {
                     owner = { name: 'Владелец', email: 'hidden' };
                }
            }

            elements.membersList.innerHTML = '';
            if(owner) {
                 elements.membersList.innerHTML += `
                    <div class="flex items-center justify-between p-2 bg-surface rounded-lg">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-ink/20 flex items-center justify-center text-[9px]">${owner.name?.[0] || owner.email[0]}</div>
                            <div><p class="text-xs text-ink">${owner.name || 'User'}</p><p class="text-[10px] text-ink-muted">${owner.email} (Владелец)</p></div>
                        </div>
                    </div>
                `;
            }

            members.forEach(m => {
                const u = m.app_users;
                const isAdmin = u.is_super_admin;
                elements.membersList.innerHTML += `
                    <div class="flex items-center justify-between p-2 bg-surface rounded-lg mt-1">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-ink/20 flex items-center justify-center text-[9px]">${u.name?.[0] || u.email[0]}</div>
                            <div><p class="text-xs text-ink">${u.name || 'User'} ${isAdmin ? '' : ''}</p><p class="text-[10px] text-ink-muted">${u.email}</p></div>
                        </div>
                        ${!isAdmin ? `<button class="remove-member-btn text-red-400 hover:text-red-300 text-xs" data-user-id="${u.id}">Удалить</button>` : ''}
                    </div>
                `;
            });

            document.querySelectorAll('.remove-member-btn').forEach(btn => {
                btn.addEventListener('click', () => removeMember(btn.dataset.userId));
            });
        }

        elements.addMemberInput.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length < 2) { elements.userSuggestions.classList.add('hidden'); return; }
            
            const { data, error } = await supabase.rpc('search_users', { search_query: query });
            if (error || !data) return;

            elements.userSuggestions.innerHTML = data.map(u => `
                <div class="suggestion-item p-2 hover:bg-surface cursor-pointer" data-id="${u.id}" data-name="${u.name || u.email}">
                    <p class="text-xs text-ink">${u.name || 'User'}</p>
                    <p class="text-[10px] text-ink-muted">${u.email}</p>
                </div>
            `).join('');
            elements.userSuggestions.classList.remove('hidden');

            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => addMember(item.dataset.id, item.dataset.name));
            });
        });

        async function addMember(userId, userName) {
            const { error } = await supabase.from('project_members').insert({ project_id: localState.activeProject, user_id: userId });
            if(error) utils.showToast("Ошибка: " + error.message, "error");
            else {
                utils.showToast(`${userName} добавлен`, "success");
                elements.addMemberInput.value = '';
                elements.userSuggestions.classList.add('hidden');
                openMembersModal(localState.activeProject);
            }
        }

        async function removeMember(userId) {
            const { error } = await supabase.from('project_members').delete().match({ project_id: localState.activeProject, user_id: userId });
            if(error) utils.showToast("Ошибка", "error");
            else { utils.showToast("Участник удален", "info"); openMembersModal(localState.activeProject); }
        }

        // ============================================
        // ОБРАБОТЧИКИ
        // ============================================
        function initEventListeners() {
            // Confirm Modal Listeners
            elements.confirmModalCancel.addEventListener('click', () => {
                elements.confirmModal.classList.add('hidden');
                localState.confirmCallback = null;
            });
            elements.confirmModalOk.addEventListener('click', () => {
                elements.confirmModal.classList.add('hidden');
                if (localState.confirmCallback) localState.confirmCallback();
            });

            // Create Project Modal
            document.getElementById('create-project-btn').addEventListener('click', () => {
                elements.createModal.classList.remove('hidden');
                elements.createModalInput.value = '';
                elements.createModalInput.focus();
            });
            document.getElementById('close-create-modal').addEventListener('click', () => elements.createModal.classList.add('hidden'));
            document.getElementById('cancel-create-btn').addEventListener('click', () => elements.createModal.classList.add('hidden'));
            
            document.getElementById('confirm-create-btn').addEventListener('click', async () => {
                const name = elements.createModalInput.value.trim();
                if (!name) return;
                
                const { data, error } = await supabase.from('projects').insert({ name: name, owner_id: state.currentUser.id }).select().single();
                if (!error && data) { 
                    localState.projects.unshift(data); 
                    renderProjects(); 
                    utils.showToast('Создано', 'success'); 
                    elements.createModal.classList.add('hidden');
                } else utils.showToast('Ошибка', 'error');
            });

            // Members Modal
            document.getElementById('close-members-modal').addEventListener('click', () => { elements.membersModal.classList.add('hidden'); });
            document.getElementById('delete-project-modal-btn').addEventListener('click', () => handleDeleteProject(localState.activeProject));

            // Files
            elements.dropZone.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
            elements.dropZone.addEventListener('dragover', (e) => { e.preventDefault(); elements.dropZone.classList.add('border-ink', 'bg-surface'); });
            elements.dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); elements.dropZone.classList.remove('border-ink', 'bg-surface'); });
            elements.dropZone.addEventListener('drop', (e) => { e.preventDefault(); elements.dropZone.classList.remove('border-ink', 'bg-surface'); handleFiles(e.dataTransfer.files); });

            // Chat
            elements.chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
            elements.chatInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
            elements.sendBtn.addEventListener('click', sendMessage)
        }

        async function handleFiles(filesList) {
            if (!filesList.length) return;
            utils.showToast(`Загрузка...`, 'info');
            for (const file of filesList) {
                const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_').toLowerCase();
                const filePath = `${state.currentUser.id}/${Date.now()}_${safeName}`;
                const { error: uploadError } = await supabase.storage.from('user-files').upload(filePath, file);
                if (uploadError) { utils.showToast(`Ошибка`, 'error'); continue; }
                const { data: urlData } = supabase.storage.from('user-files').getPublicUrl(filePath);
                const { error: dbError } = await supabase.from('files').insert({
                    project_id: localState.activeProject, uploader_id: state.currentUser.id, name: file.name, original_name: file.name,
                    mime_type: file.type, size: file.size, storage_path: urlData.publicUrl, tags: []
                });
                
                if(!dbError) await logFileAction('create', file.name);
            }
            utils.showToast('Готово', 'success');
            elements.fileInput.value = '';
            await loadFiles();
            elements.filesList.scrollTop = 0;
        }

        async function logFileAction(action, fileName) {
            const text = action === 'create' ? `Создал файл: ${fileName}` : `Удалил файл: ${fileName}`;
            await supabase.from('messages').insert({ project_id: localState.activeProject, sender_id: state.currentUser.id, content: text });
        }

        async function sendMessage() {
            const text = elements.chatInput.value.trim();
            if (!text || !localState.activeProject) return;
            appendMessage({ id: 'temp-' + Date.now(), content: text, created_at: new Date().toISOString(), sender_id: state.currentUser.id, author: { name: state.appUser.name } });
            scrollToBottom();
            elements.chatInput.value = ''; elements.chatInput.style.height = 'auto';
            await supabase.from('messages').insert({ project_id: localState.activeProject, sender_id: state.currentUser.id, content: text });
        }
        
        function formatTime(dateStr) { return new Date(dateStr).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }); }
        function formatSize(bytes) { if(bytes > 1000*1024*1024) return (bytes/(1024*1024*1024)).toFixed(1)+' GB'; if(bytes > 1024*1024) return (bytes/(1024*1024)).toFixed(1)+' MB'; if(bytes > 1024) return (bytes/1024).toFixed(1)+' KB'; return bytes + ' B'; }
        function scrollToBottom() { elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight; }
        function escapeHtml(text) { if (!text) return text; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        init();
    });
})();
</script>
