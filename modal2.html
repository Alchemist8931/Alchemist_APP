<!-- 
    Файл: modal2.html 
    Страница: Проекты, Файлы, Чат
-->
<div class="flex h-[calc(100vh-64px)] overflow-hidden" id="projects-page">
    
    <!-- ЛЕВАЯ ПАНЕЛЬ: Список проектов -->
    <aside class="w-[300px] border-r border-gray-light flex flex-col bg-surface-bright/30">
        <div class="p-4 border-b border-gray-light flex items-center justify-between">
            <h2 class="font-display font-semibold text-ink">Проекты</h2>
            <button id="create-project-btn" class="w-8 h-8 rounded-lg border border-gray-light hover:border-ink/30 hover:bg-surface flex items-center justify-center transition-colors" title="Новый проект">
                <svg class="w-4 h-4 text-ink-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto p-2" id="projects-list">
            <!-- Сюда подгружаются проекты -->
            <div class="text-center py-10 text-ink-muted text-xs">Загрузка...</div>
        </div>
    </aside>

    <!-- ЦЕНТРАЛЬНАЯ ПАНЕЛЬ: Файлы -->
    <main class="flex-1 flex flex-col min-w-0">
        <!-- Зона загрузки файлов -->
        <div class="p-4 border-b border-gray-light">
            <div id="drop-zone" class="border-2 border-dashed border-gray-light rounded-xl p-6 text-center cursor-pointer hover:border-ink/20 transition-colors">
                <input type="file" id="file-input" multiple class="hidden">
                <svg class="w-8 h-8 text-ink-muted mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                <p class="text-sm text-ink-light">Перетащите файлы сюда или кликните для выбора</p>
                <p class="text-xs text-ink-muted mt-1">Проект будет выбран автоматически или создан новый</p>
            </div>
        </div>

        <!-- Список файлов -->
        <div class="flex-1 overflow-y-auto p-4" id="files-list">
            <!-- Сюда подгружаются файлы -->
        </div>
    </main>

    <!-- ПРАВАЯ ПАНЕЛЬ: Чат -->
    <aside class="w-[350px] border-l border-gray-light flex flex-col bg-surface-bright/30">
        <div class="p-4 border-b border-gray-light">
            <h2 class="font-display font-semibold text-ink">Активность и чат</h2>
            <p class="text-xs text-ink-muted mt-1" id="active-project-name">Общий чат</p>
        </div>
        
        <!-- Сообщения -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-messages">
            <!-- Сюда подгружаются сообщения -->
        </div>
        
        <!-- Поле ввода -->
        <div class="p-4 border-t border-gray-light">
            <div class="flex gap-2">
                <input type="text" id="chat-input" placeholder="Написать сообщение..." class="form-input flex-1 px-4 py-2 rounded-lg text-sm bg-surface border-gray-light focus:border-ink/30">
                <button id="send-msg-btn" class="btn-primary px-4 py-2 rounded-lg text-surface-bright">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </div>
        </div>
    </aside>
</div>

<script>
// Логика страницы modal2.html
(function() {
    // Получаем доступ к глобальным переменным из index.html
    const state = window.AppState;
    const supabase = window.supabase;
    const utils = window.Utils;
    
    // Локальное состояние страницы
    const localState = {
        projects: [],
        files: [],
        messages: [],
        activeProject: null, // ID выбранного проекта
        activeProjectName: 'Общий чат'
    };

    // Элементы DOM
    const elements = {
        projectsList: document.getElementById('projects-list'),
        filesList: document.getElementById('files-list'),
        chatMessages: document.getElementById('chat-messages'),
        chatInput: document.getElementById('chat-input'),
        dropZone: document.getElementById('drop-zone'),
        fileInput: document.getElementById('file-input'),
        activeProjectName: document.getElementById('active-project-name')
    };

    // ============================================
    // ИНИЦИАЛИЗАЦИЯ
    // ============================================
    async function init() {
        await loadProjects();
        await loadFiles();
        await loadMessages();
        initEventListeners();
        
        // Подписка на реальные сообщения (Realtime)
        supabase.channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (payload.new.project_id === localState.activeProject || (!payload.new.project_id && !localState.activeProject)) {
                    localState.messages.push(payload.new);
                    renderMessages();
                    scrollToBottom();
                }
            })
            .subscribe();
    }

    // ============================================
    // ЗАГРУЗКА ДАННЫХ
    // ============================================
    async function loadProjects() {
        const { data, error } = await supabase
            .from('projects')
            .select('*')
            .eq('owner_id', state.currentUser.id)
            .order('created_at', { ascending: false });

        if (!error && data) {
            localState.projects = data;
            renderProjects();
        }
    }

    async function loadFiles() {
        let query = supabase
            .from('files')
            .select('*, profiles:uploader_id(name, email)')
            .order('created_at', { ascending: false });

        if (localState.activeProject) {
            query = query.eq('project_id', localState.activeProject);
        } else {
            // Если проект не выбран, можно показывать все файлы или никакие
            // Здесь показываем все
        }

        const { data, error } = await query;
        if (!error && data) {
            localState.files = data;
            renderFiles();
        }
    }

    async function loadMessages() {
        let query = supabase
            .from('messages')
            .select('*, author:sender_id(name, email)')
            .order('created_at', { ascending: true });

        if (localState.activeProject) {
            query = query.eq('project_id', localState.activeProject);
        } else {
            query = query.is('project_id', null);
        }

        const { data, error } = await query;
        if (!error && data) {
            localState.messages = data;
            renderMessages();
            scrollToBottom();
        }
    }

    // ============================================
    // РЕНДЕРИНГ
    // ============================================
    function renderProjects() {
        elements.projectsList.innerHTML = `
            <div class="p-2 mb-2 text-xs text-ink-muted uppercase tracking-wider">Ваши проекты</div>
            <div class="space-y-1">
                <div class="project-item flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer hover:bg-surface transition-colors ${!localState.activeProject ? 'bg-surface border border-gray-light' : ''}" data-id="">
                    <div class="w-2 h-2 rounded-full bg-ink-light"></div>
                    <span class="text-sm text-ink-light truncate">Все файлы</span>
                </div>
                ${localState.projects.map(p => `
                    <div class="project-item flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer hover:bg-surface transition-colors ${localState.activeProject === p.id ? 'bg-surface border border-gray-light' : ''}" data-id="${p.id}">
                        <div class="w-2 h-2 rounded-full bg-ink"></div>
                        <span class="text-sm text-ink truncate">${p.name}</span>
                    </div>
                `).join('')}
            </div>
        `;

        // Обработчики кликов
        document.querySelectorAll('.project-item').forEach(el => {
            el.addEventListener('click', async () => {
                const id = el.dataset.id;
                localState.activeProject = id || null;
                
                const project = localState.projects.find(p => p.id === id);
                localState.activeProjectName = project ? project.name : 'Общий чат';
                elements.activeProjectName.textContent = localState.activeProjectName;

                // Перезагружаем данные для выбранного проекта
                await loadFiles();
                await loadMessages();
                renderProjects(); // Обновить подсветку
            });
        });
    }

    function renderFiles() {
        if (localState.files.length === 0) {
            elements.filesList.innerHTML = `
                <div class="text-center py-20">
                    <svg class="w-12 h-12 text-ink-muted mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                    </svg>
                    <p class="text-ink-muted text-sm">Нет загруженных файлов</p>
                </div>
            `;
            return;
        }

        elements.filesList.innerHTML = `
            <div class="space-y-3">
                ${localState.files.map(f => `
                    <div class="file-card bg-card rounded-xl p-4 border border-gray-light flex items-center gap-4">
                        <!-- Иконка файла -->
                        <div class="w-12 h-12 flex-shrink-0 rounded-lg bg-surface border border-gray-light flex flex-col items-center justify-center">
                            <span class="text-[10px] font-bold text-ink-muted uppercase">${getExtension(f.name)}</span>
                        </div>
                        
                        <!-- Информация -->
                        <div class="flex-1 min-w-0">
                            <p class="text-sm text-ink font-medium truncate mb-1">${f.name}</p>
                            <p class="text-xs text-ink-muted">
                                ${f.profiles?.name || f.profiles?.email || 'User'} • ${formatDate(f.created_at)}
                            </p>
                        </div>

                        <!-- Кнопка скачивания -->
                        <a href="${f.storage_path}" target="_blank" class="w-8 h-8 rounded-lg border border-gray-light hover:border-ink/20 flex items-center justify-center transition-colors">
                            <svg class="w-4 h-4 text-ink-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                            </svg>
                        </a>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderMessages() {
        if (localState.messages.length === 0) {
            elements.chatMessages.innerHTML = `
                <div class="text-center py-10 text-ink-muted text-xs">Нет сообщений</div>
            `;
            return;
        }

        elements.chatMessages.innerHTML = localState.messages.map(m => `
            <div class="message-item">
                <div class="flex items-start gap-3 mb-2">
                    <div class="w-7 h-7 rounded-full bg-surface border border-gray-light flex-shrink-0 overflow-hidden">
                        <!-- Аватарка если есть -->
                    </div>
                    <div class="flex-1">
                        <div class="flex items-baseline gap-2">
                            <span class="text-xs font-semibold text-ink">${m.author?.name || 'User'}</span>
                            <span class="text-[10px] text-ink-muted">${formatTime(m.created_at)}</span>
                        </div>
                        <p class="text-sm text-ink-light mt-1">${m.content}</p>
                        
                        ${m.file_id ? `
                            <div class="mt-2 text-xs bg-surface p-2 rounded border border-gray-light inline-flex items-center gap-2 text-ink-muted">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                                Файл прикреплен
                            </div>
                        ` : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ============================================
    // ОБРАБОТЧИКИ СОБЫТИЙ
    // ============================================
    function initEventListeners() {
        // Создание проекта
        document.getElementById('create-project-btn').addEventListener('click', async () => {
            const name = prompt('Название нового проекта:');
            if (!name) return;

            const { data, error } = await supabase
                .from('projects')
                .insert({ name: name, owner_id: state.currentUser.id })
                .select()
                .single();

            if (!error && data) {
                localState.projects.unshift(data);
                renderProjects();
                utils.showToast('Проект создан', 'success');
            } else {
                utils.showToast('Ошибка создания проекта', 'error');
            }
        });

        // Загрузка файлов (Клик)
        elements.dropZone.addEventListener('click', () => elements.fileInput.click());
        elements.fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        // Drag & Drop
        elements.dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            elements.dropZone.classList.add('border-ink', 'bg-surface');
        });
        elements.dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            elements.dropZone.classList.remove('border-ink', 'bg-surface');
        });
        elements.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            elements.dropZone.classList.remove('border-ink', 'bg-surface');
            handleFiles(e.dataTransfer.files);
        });

        // Отправка сообщения
        document.getElementById('send-msg-btn').addEventListener('click', sendMessage);
        elements.chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    }

    async function handleFiles(filesList) {
        if (!filesList.length) return;

        utils.showToast(`Загрузка ${filesList.length} файлов...`, 'info');

        for (const file of filesList) {
            // 1. Загрузка файла в Storage
            const filePath = `${state.currentUser.id}/${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('user-files')
                .upload(filePath, file);

            if (uploadError) {
                utils.showToast(`Ошибка загрузки ${file.name}`, 'error');
                continue;
            }

            // 2. Получаем публичный URL
            const { data: urlData } = supabase.storage.from('user-files').getPublicUrl(filePath);

            // 3. Запись в БД
            const { data: fileData, error: dbError } = await supabase
                .from('files')
                .insert({
                    project_id: localState.activeProject,
                    uploader_id: state.currentUser.id,
                    name: file.name,
                    original_name: file.name,
                    mime_type: file.type,
                    size: file.size,
                    storage_path: urlData.publicUrl
                })
                .select('id')
                .single();

            if (dbError) {
                console.error(dbError);
                continue;
            }

            // 4. Создаем сообщение в чате
            await supabase.from('messages').insert({
                project_id: localState.activeProject,
                sender_id: state.currentUser.id,
                content: `Загрузил файл: ${file.name}`,
                file_id: fileData.id
            });
        }

        utils.showToast('Файлы загружены', 'success');
        elements.fileInput.value = '';
        await loadFiles();
        await loadMessages();
    }

    async function sendMessage() {
        const text = elements.chatInput.value.trim();
        if (!text) return;

        await supabase.from('messages').insert({
            project_id: localState.activeProject,
            sender_id: state.currentUser.id,
            content: text
        });

        elements.chatInput.value = '';
        // Сообщение подхватится автоматически через Realtime подписку
    }

    // ============================================
    // ХЕЛПЕРЫ
    // ============================================
    function getExtension(filename) {
        const parts = filename.split('.');
        return parts.length > 1 ? parts.pop().substring(0, 4) : 'FILE';
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }

    function formatTime(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function scrollToBottom() {
        const container = elements.chatMessages;
        container.scrollTop = container.scrollHeight;
    }

    // Запуск
    if (state.currentUser) {
        init();
    } else {
        console.warn("App state not ready for modal2");
    }
})();
</script>
