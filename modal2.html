<!-- 
    Файл: modal2.html 
    Страница: Проекты, Файлы, Чат
-->
<div class="w-full h-[calc(100vh-64px)] overflow-hidden flex justify-center bg-surface-bright/20">
    
    <!-- Контейнер 1600px -->
    <div class="w-[1600px] h-full flex border-l border-r border-gray-light bg-surface-bright">
        
        <!-- ЛЕВАЯ ПАНЕЛЬ: Проекты (300px) -->
        <aside class="w-[300px] flex-shrink-0 border-r border-gray-light flex flex-col">
            <div class="p-4 border-b border-gray-light flex items-center justify-between">
                <h2 class="font-display font-semibold text-ink">Проекты</h2>
                <button id="create-project-btn" class="w-8 h-8 rounded-lg border border-gray-light hover:border-ink/30 hover:bg-surface flex items-center justify-center transition-colors" title="Новый проект">
                    <svg class="w-4 h-4 text-ink-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-2" id="projects-list">
                <div class="text-center py-10 text-ink-muted text-xs">Загрузка...</div>
            </div>
        </aside>

        <!-- ЦЕНТРАЛЬНАЯ ПАНЕЛЬ: Файлы -->
        <main class="flex-1 min-w-0 flex flex-col">
            <!-- Зона загрузки -->
            <div class="p-4 border-b border-gray-light">
                <div id="drop-zone" class="border-2 border-dashed border-gray-light rounded-xl p-4 text-center cursor-pointer hover:border-ink/20 transition-colors">
                    <input type="file" id="file-input" multiple class="hidden">
                    <svg class="w-6 h-6 text-ink-muted mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <p class="text-xs text-ink-light">Перетащите файлы или кликните для выбора</p>
                    <p class="text-[10px] text-ink-muted mt-1" id="upload-hint">Выберите проект слева для привязки</p>
                </div>
            </div>

            <!-- Список файлов: Добавлен класс space-y-5 для отступа 20px -->
            <div class="flex-1 overflow-y-auto p-4 space-y-5" id="files-list">
                <!-- Файлы подгрузятся здесь -->
            </div>
        </main>

        <!-- ПРАВАЯ ПАНЕЛЬ: Чат -->
        <aside class="w-[600px] flex-shrink-0 border-l border-gray-light flex flex-col bg-surface-bright/30">
            <div class="p-4 border-b border-gray-light">
                <h2 class="font-display font-semibold text-ink">Чат проекта</h2>
                <p class="text-xs text-ink-muted mt-1" id="chat-project-name">Выберите проект</p>
            </div>
            
            <!-- Сообщения -->
            <div class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col-reverse" id="chat-messages">
                <!-- Сообщения -->
            </div>
            
            <!-- Поле ввода -->
            <div class="p-4 border-t border-gray-light bg-surface-bright/50">
                <div class="flex flex-col gap-2">
                    <textarea id="chat-input" placeholder="Выберите проект..." 
                        class="w-full bg-surface border border-gray-light rounded-lg px-4 py-2 text-sm text-ink focus:outline-none focus:border-ink/30 disabled:opacity-50 font-sans tracking-normal resize-none overflow-hidden" 
                        rows="1" disabled></textarea>
                    <div class="flex justify-end">
                        <button id="send-msg-btn" class="btn-primary px-4 py-2 rounded-lg text-surface-bright disabled:opacity-50" disabled>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

    </div>
</div>

<!-- Шаблон для карточки файла -->
<template id="file-card-template">
    <div class="file-card bg-card rounded-xl p-3 border border-gray-light flex items-start gap-3 group relative" data-file-id="">
        
        <!-- Левая часть: Иконка (выравнивание сверху) -->
        <div class="flex flex-col items-center flex-shrink-0 pt-1">
            <div class="w-10 h-10 rounded-lg bg-surface border border-gray-light flex flex-col items-center justify-center">
                <span class="text-[9px] font-bold text-ink-muted uppercase ext-icon"></span>
            </div>
        </div>

        <!-- Центральная часть: Информация -->
        <div class="flex-1 flex flex-col min-w-0 gap-2">
            <!-- Строка 1: Название -->
            <p class="text-xs text-ink font-medium truncate file-name"></p>
            
            <!-- Строка 2: Мета -->
            <p class="text-[10px] text-ink-muted file-meta"></p>
            
            <!-- Строки 3-4: Поля ввода (шириной 250px) без подписей -->
            <div class="flex flex-col gap-2 w-[250px] mt-1">
                <select class="bg-surface border border-gray-light rounded px-2 py-1 text-[11px] text-ink focus:outline-none focus:border-ink/30 select-project truncate">
                    <option value="">Мои файлы</option>
                </select>
                
                <div class="relative">
                    <input type="text" class="w-full bg-surface border border-gray-light rounded px-2 py-1 text-[11px] text-ink focus:outline-none focus:border-ink/30 input-tags font-sans tracking-normal" placeholder="Тег + пробел">
                    <div class="hidden absolute left-0 bottom-full mb-1 w-48 bg-surface border border-gray-light rounded shadow-lg text-xs max-h-32 overflow-y-auto z-10 tags-dropdown"></div>
                </div>
            </div>
        </div>

        <!-- Правая часть: Кнопка скачивания (в конце карточки, сверху) -->
        <div class="flex-shrink-0 pt-1">
            <a href="#" target="_blank" class="w-7 h-7 rounded border border-gray-light hover:border-ink/20 flex items-center justify-center transition-colors">
                <svg class="w-3 h-3 text-ink-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
            </a>
        </div>

        <!-- Индикатор сохранения -->
        <div class="absolute top-2 right-2 opacity-0 transition-opacity saving-indicator">
            <svg class="w-3 h-3 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
    </div>
</template>

<script>
(function() {
    
    function waitForGlobals(callback) {
        if (window.AppState && window.supabase && window.Utils) {
            callback();
        } else {
            setTimeout(() => waitForGlobals(callback), 100);
        }
    }

    waitForGlobals(() => {
        console.log("Modal2: Initialized");

        const state = window.AppState;
        const supabase = window.supabase;
        const utils = window.Utils;
        
        const localState = {
            projects: [],
            files: [],
            messages: [],
            activeProject: null, 
            activeProjectName: null,
            
            realtimeChannel: null,
            isLoadingMessages: false,
            hasMoreMessages: true,
            oldestMessageDate: null,
            
            allTags: new Set()
        };

        const elements = {
            projectsList: document.getElementById('projects-list'),
            filesList: document.getElementById('files-list'),
            chatMessages: document.getElementById('chat-messages'),
            chatInput: document.getElementById('chat-input'),
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            chatProjectName: document.getElementById('chat-project-name'),
            uploadHint: document.getElementById('upload-hint'),
            sendBtn: document.getElementById('send-msg-btn')
        };

        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        async function init() {
            await loadProjects();
            await loadAllTags();
            await loadFiles();
            
            updateChatState(false);
            initEventListeners();
        }

        // ============================================
        // ЗАГРУЗКА ДАННЫХ
        // ============================================
        
        async function loadProjects() {
            const { data, error } = await supabase
                .from('projects')
                .select('*')
                .eq('owner_id', state.currentUser.id)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error loading projects:", error);
                return;
            }
            localState.projects = data || [];
            renderProjects();
        }

        async function loadAllTags() {
            try {
                const { data, error } = await supabase.rpc('get_all_tags');
                if (!error && data) {
                    data.forEach(t => localState.allTags.add(t));
                }
            } catch (e) {
                const { data: files } = await supabase.from('files').select('tags');
                if(files) {
                    files.forEach(f => {
                        if(f.tags) f.tags.forEach(t => localState.allTags.add(t));
                    });
                }
            }
        }

        async function loadFiles() {
            let query = supabase
                .from('files')
                .select('id, name, created_at, size, storage_path, tags, project_id, profiles:uploader_id(name, email)')
                .order('created_at', { ascending: false });

            if (localState.activeProject) {
                query = query.eq('project_id', localState.activeProject);
            }

            const { data, error } = await query;
            if (error) {
                console.error("Load files error", error);
                return;
            }
            
            if (data) {
                localState.files = data;
                renderFiles();
            }
        }

        // ============================================
        // ЧАТ ЛОГИКА
        // ============================================

        function updateChatState(isActive) {
            elements.chatInput.disabled = !isActive;
            elements.sendBtn.disabled = !isActive;
            
            if (!isActive) {
                elements.chatMessages.innerHTML = `<div class="text-center py-10 text-ink-muted text-xs flex items-center justify-center h-full">Выберите проект для начала чата</div>`;
                elements.chatProjectName.textContent = "Выберите проект";
            } else {
                elements.chatProjectName.textContent = localState.activeProjectName;
                elements.chatInput.placeholder = "Написать сообщение...";
            }
        }

        async function loadMessages(initial = true) {
            if (localState.isLoadingMessages) return;
            if (!initial && !localState.hasMoreMessages) return;
            
            localState.isLoadingMessages = true;

            let query = supabase
                .from('messages')
                .select('id, content, created_at, sender_id, author:sender_id(name, email)')
                .eq('project_id', localState.activeProject)
                .order('created_at', { ascending: false });

            if (!initial && localState.oldestMessageDate) {
                query = query.lt('created_at', localState.oldestMessageDate);
            }

            query = query.limit(initial ? 50 : 30);

            const { data, error } = await query;

            if (error) {
                console.error("Error loading messages", error);
                localState.isLoadingMessages = false;
                return;
            }

            if (data.length === 0) {
                localState.hasMoreMessages = false;
                localState.isLoadingMessages = false;
                if (initial) elements.chatMessages.innerHTML = `<div class="text-center py-10 text-ink-muted text-xs">Нет сообщений</div>`;
                return;
            }

            data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            if (initial) {
                localState.messages = data;
                renderMessages();
                scrollToBottom();
            } else {
                const container = elements.chatMessages;
                const prevScrollHeight = container.scrollHeight;
                
                localState.messages = [...data, ...localState.messages];
                renderMessages();
                
                container.scrollTop = container.scrollHeight - prevScrollHeight;
            }

            localState.oldestMessageDate = localState.messages[0]?.created_at;
            localState.hasMoreMessages = true;
            localState.isLoadingMessages = false;
        }

        async function subscribeToChat(projectId) {
            if (localState.realtimeChannel) {
                try {
                    await supabase.removeChannel(localState.realtimeChannel);
                } catch(e) { console.warn("Channel remove err", e); }
            }

            localState.realtimeChannel = supabase.channel(`chat:${projectId}`, {
                config: { broadcast: { self: true } }
            });

            localState.realtimeChannel.on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'messages',
                filter: `project_id=eq.${projectId}`
            }, (payload) => {
                const msg = payload.new;
                if(msg.sender_id === state.currentUser.id) {
                    msg.author = { name: state.appUser.name };
                }
                
                // Добавляем в состояние
                localState.messages.push(msg);
                // Рендерим и скроллим
                appendMessage(msg);
                scrollToBottom();
            });

            localState.realtimeChannel.subscribe();
        }

        // ============================================
        // РЕНДЕРИНГ
        // ============================================
        
        function renderProjects() {
            elements.projectsList.innerHTML = `
                <div class="p-2 mb-2 text-xs text-ink-muted uppercase tracking-wider">Ваши проекты</div>
                <div class="space-y-1">
                    <div class="project-item flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer hover:bg-surface transition-colors ${!localState.activeProject ? 'bg-surface border border-gray-light' : ''}" data-id="">
                        <div class="w-2 h-2 rounded-full bg-ink-light"></div>
                        <span class="text-sm text-ink-light truncate">Все файлы</span>
                    </div>
                    ${localState.projects.map(p => `
                        <div class="project-item flex items-center gap-3 px-3 py-2 rounded-lg cursor-pointer hover:bg-surface transition-colors ${localState.activeProject === p.id ? 'bg-surface border border-gray-light' : ''}" data-id="${p.id}">
                            <div class="w-2 h-2 rounded-full bg-ink"></div>
                            <span class="text-sm text-ink truncate">${escapeHtml(p.name)}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            document.querySelectorAll('.project-item').forEach(el => {
                el.addEventListener('click', async () => {
                    const id = el.dataset.id || null;
                    localState.activeProject = id;
                    
                    const project = localState.projects.find(p => p.id === id);
                    localState.activeProjectName = project ? project.name : 'Все файлы';
                    
                    elements.uploadHint.textContent = id ? `Файлы будут добавлены в "${localState.activeProjectName}"` : "Файлы без проекта (Мои файлы)";
                    
                    const chatActive = !!id;
                    updateChatState(chatActive);

                    localState.messages = [];
                    localState.oldestMessageDate = null;
                    localState.hasMoreMessages = true;

                    if(id) {
                        await loadMessages(true);
                        subscribeToChat(id);
                    } else {
                        if(localState.realtimeChannel) supabase.removeChannel(localState.realtimeChannel);
                        elements.chatMessages.innerHTML = `<div class="text-center py-10 text-ink-muted text-xs flex items-center justify-center h-full">Выберите проект для чата</div>`;
                    }

                    await loadFiles();
                    renderProjects();
                });
            });
        }

        function renderFiles() {
            if (localState.files.length === 0) {
                elements.filesList.innerHTML = `
                    <div class="text-center py-20">
                        <svg class="w-12 h-12 text-ink-muted mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                        </svg>
                        <p class="text-ink-muted text-sm">Нет файлов</p>
                    </div>
                `;
                return;
            }

            const template = document.getElementById('file-card-template');
            elements.filesList.innerHTML = '';

            localState.files.forEach(f => {
                const clone = template.content.cloneNode(true);
                const card = clone.querySelector('.file-card');
                
                card.dataset.fileId = f.id;
                
                clone.querySelector('.ext-icon').textContent = getExtension(f.name);
                clone.querySelector('.file-name').textContent = f.name;
                clone.querySelector('.file-meta').textContent = `${f.profiles?.name || 'User'} • ${formatDate(f.created_at)} • ${formatBytes(f.size)}`;
                
                const downloadBtn = clone.querySelector('a');
                downloadBtn.href = f.storage_path;

                const select = clone.querySelector('.select-project');
                select.innerHTML = '<option value="">Мои файлы</option>';
                localState.projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name;
                    select.appendChild(opt);
                });
                select.value = f.project_id || "";

                const inputTags = clone.querySelector('.input-tags');
                inputTags.value = (f.tags || []).join(' ');
                
                select.addEventListener('change', (e) => updateFileProject(f.id, e.target.value));
                inputTags.addEventListener('change', (e) => updateFileTags(f.id, e.target.value));
                inputTags.addEventListener('input', (e) => handleTagInput(e, f.id));

                elements.filesList.appendChild(clone);
            });
        }
        
        function appendMessage(msg) {
            // Удаляем временное сообщение, если оно есть (по совпадению контента и времени с точностью до секунды)
            // Это предотвратит дублирование при получении Realtime события
            const tempMessages = elements.chatMessages.querySelectorAll('.temp-message');
            tempMessages.forEach(el => el.remove());

            const html = createMessageHTML(msg);
            elements.chatMessages.insertAdjacentHTML('beforeend', html);
        }

        function renderMessages() {
            elements.chatMessages.innerHTML = localState.messages.map(m => createMessageHTML(m)).join('');
        }

        function createMessageHTML(m) {
            return `
                <div class="message-item p-2 rounded-lg hover:bg-surface/50">
                    <div class="flex items-start gap-2">
                        <div class="w-6 h-6 rounded-full bg-surface border border-gray-light flex-shrink-0 flex items-center justify-center text-[8px] text-ink-muted">
                            ${m.author?.name ? escapeHtml(m.author.name.charAt(0).toUpperCase()) : 'U'}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-baseline gap-2">
                                <span class="text-[11px] font-semibold text-ink">${escapeHtml(m.author?.name || 'User')}</span>
                                <span class="text-[9px] text-ink-muted">${formatTime(m.created_at)}</span>
                            </div>
                            <p class="text-xs text-ink-light mt-0.5 whitespace-pre-wrap break-words">${escapeHtml(m.content)}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================
        // ОБРАБОТЧИКИ
        // ============================================
        function initEventListeners() {
            document.getElementById('create-project-btn').addEventListener('click', async () => {
                const name = prompt('Название нового проекта:');
                if (!name) return;

                const { data, error } = await supabase
                    .from('projects')
                    .insert({ name: name, owner_id: state.currentUser.id })
                    .select()
                    .single();

                if (!error && data) {
                    localState.projects.unshift(data);
                    renderProjects();
                    utils.showToast('Проект создан', 'success');
                } else {
                    utils.showToast('Ошибка создания', 'error');
                }
            });

            elements.dropZone.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

            elements.dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                elements.dropZone.classList.add('border-ink', 'bg-surface');
            });
            elements.dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                elements.dropZone.classList.remove('border-ink', 'bg-surface');
            });
            elements.dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                elements.dropZone.classList.remove('border-ink', 'bg-surface');
                handleFiles(e.dataTransfer.files);
            });

            elements.chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault(); 
                    sendMessage();
                }
            });

            elements.chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
            });

            elements.sendBtn.addEventListener('click', sendMessage);

            elements.chatMessages.addEventListener('scroll', () => {
                if (elements.chatMessages.scrollTop < 50 && !localState.isLoadingMessages && localState.activeProject) {
                    loadMessages(false);
                }
            });
        }

        async function handleFiles(filesList) {
            if (!filesList.length) return;

            utils.showToast(`Загрузка ${filesList.length} файлов...`, 'info');

            for (const file of filesList) {
                const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_').toLowerCase();
                const filePath = `${state.currentUser.id}/${Date.now()}_${safeName}`;
                
                const { error: uploadError } = await supabase.storage
                    .from('user-files')
                    .upload(filePath, file);

                if (uploadError) {
                    utils.showToast(`Ошибка: ${uploadError.message}`, 'error');
                    continue;
                }

                const { data: urlData } = supabase.storage.from('user-files').getPublicUrl(filePath);

                const projectId = localState.activeProject;

                const { error: dbError } = await supabase
                    .from('files')
                    .insert({
                        project_id: projectId,
                        uploader_id: state.currentUser.id,
                        name: file.name,
                        original_name: file.name,
                        mime_type: file.type,
                        size: file.size,
                        storage_path: urlData.publicUrl,
                        tags: []
                    });

                if (dbError) {
                    utils.showToast(`Ошибка БД: ${dbError.message}`, 'error');
                }
            }

            utils.showToast('Файлы загружены', 'success');
            elements.fileInput.value = '';
            
            // Гарантированное обновление списка файлов
            await loadFiles();
            
            // Прокрутка вверх, так как новые файлы вверху списка
            elements.filesList.scrollTop = 0;
        }

        async function sendMessage() {
            const text = elements.chatInput.value.trim();
            if (!text || !localState.activeProject) return;

            // Создаем временное сообщение
            const tempId = 'temp-' + Date.now();
            const tempMsg = {
                id: tempId,
                content: text,
                created_at: new Date().toISOString(),
                sender_id: state.currentUser.id,
                author: { name: state.appUser.name },
                project_id: localState.activeProject
            };
            
            // Добавляем в DOM и скроллим
            appendMessage(tempMsg);
            scrollToBottom();
            
            elements.chatInput.value = '';
            elements.chatInput.style.height = 'auto';

            // Отправляем на сервер
            const { error } = await supabase.from('messages').insert({
                project_id: localState.activeProject,
                sender_id: state.currentUser.id,
                content: text
            });
            
            if(error) {
                utils.showToast("Ошибка отправки", "error");
                // Если ошибка, можно удалить temp сообщение из DOM
                const tempEl = document.getElementById(tempId);
                if(tempEl) tempEl.remove();
            }
            // При успехе Realtime сработает и добавит постоянное сообщение, 
            // наш appendMessage автоматически удалит temp class если он есть или мы удалим его выше.
        }
        
        async function updateFileProject(fileId, projectId) {
            showSaving(fileId);
            const { error } = await supabase.from('files').update({ project_id: projectId || null }).eq('id', fileId);
            if(error) utils.showToast("Ошибка обновления проекта", "error");
            hideSaving(fileId);
        }

        async function updateFileTags(fileId, tagsString) {
            showSaving(fileId);
            const tags = tagsString.split(' ').filter(t => t.trim() !== '');
            const { error } = await supabase.from('files').update({ tags }).eq('id', fileId);
            if(error) {
                utils.showToast("Ошибка сохранения тегов", "error");
            } else {
                tags.forEach(t => localState.allTags.add(t));
            }
            hideSaving(fileId);
        }

        function handleTagInput(e, fileId) {
            const val = e.target.value;
            const lastChar = val[val.length - 1];
            
            if (lastChar === ' ') {
                updateFileTags(fileId, val);
                showTagSuggestions(e.target, val);
            } else {
                showTagSuggestions(e.target, val);
            }
        }
        
        function showTagSuggestions(input, text) {
            const dropdown = input.nextElementSibling;
            const parts = text.split(' ');
            const currentInput = parts[parts.length - 1];
            
            if (!currentInput) {
                dropdown.classList.add('hidden');
                return;
            }

            const matches = Array.from(localState.allTags)
                .filter(t => t.toLowerCase().startsWith(currentInput.toLowerCase()))
                .slice(0, 5);

            if (matches.length === 0) {
                dropdown.classList.add('hidden');
                return;
            }

            dropdown.innerHTML = matches.map(t => 
                `<div class="px-3 py-2 hover:bg-surface cursor-pointer">${escapeHtml(t)}</div>`
            ).join('');
            
            dropdown.classList.remove('hidden');

            dropdown.querySelectorAll('div').forEach((el, idx) => {
                el.onclick = () => {
                    parts[parts.length - 1] = matches[idx];
                    input.value = parts.join(' ') + ' ';
                    dropdown.classList.add('hidden');
                    input.focus();
                    updateFileTags(input.closest('.file-card').dataset.fileId, input.value);
                };
            });
        }

        function showSaving(fileId) {
            const card = document.querySelector(`[data-file-id="${fileId}"]`);
            if(card) {
                const ind = card.querySelector('.saving-indicator');
                ind.style.opacity = 1;
                ind.innerHTML = `<svg class="w-3 h-3 text-yellow-500 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>`;
            }
        }

        function hideSaving(fileId) {
            const card = document.querySelector(`[data-file-id="${fileId}"]`);
            if(card) {
                const indicator = card.querySelector('.saving-indicator');
                indicator.innerHTML = `<svg class="w-3 h-3 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`;
                setTimeout(() => indicator.style.opacity = 0, 1500);
            }
        }

        function getExtension(filename) {
            const parts = filename.split('.');
            return parts.length > 1 ? parts.pop().substring(0, 4).toUpperCase() : 'FILE';
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }
        
        function formatTime(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }
        
        function formatBytes(bytes) {
            if(bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function scrollToBottom() {
            elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
        }
        
        function escapeHtml(text) {
            if (!text) return text;
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    });

})();
</script>
